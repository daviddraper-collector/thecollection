// ── Firebase helpers ──────────────────────────────────────────────────────────
const blankCatalog = () => Object.fromEntries(DEFAULT_ORDER.map(k=>[k,[]]));
const blankState   = () => ({
  catalog:    blankCatalog(),
  order:      [...DEFAULT_ORDER],
  hidden:     [],
  token:      "",
  tmdbToken:  "",
});

async function fbLoad() {
  const db=window._db, docRef=window._doc(db,"collection",DOC_ID);
  const snap = await window._getDoc(docRef);
  if (snap.exists()) {
    const d = snap.data();
    const catalog = {...blankCatalog(), ...(d.catalog||{})};
    // Ensure tag fields are always arrays — Firestore can deserialize them
    // as undefined if they were stripped during a bad save
    Object.keys(catalog).forEach(tab=>{
      if(SCHEMAS[tab]&&Array.isArray(catalog[tab])){
        catalog[tab]=catalog[tab].map(rec=>{
          const fixed={...rec};
          (SCHEMAS[tab].fields||[]).filter(f=>f.type==="tags").forEach(f=>{
            if(!Array.isArray(fixed[f.key])) fixed[f.key]=[];
          });
          return fixed;
        });
      }
    });
    return {
      catalog,
      order:     d.order     || [...DEFAULT_ORDER],
      hidden:    d.hidden    || [],
      token:     d.token     || "",
      tmdbToken: d.tmdbToken || "",
    };
  }
  return blankState();
}

async function fbSave(data) {
  const db=window._db, docRef=window._doc(db,"collection",DOC_ID);
  // JSON round-trip strips undefined values — Firestore silently drops array
  // fields when undefined values are present anywhere in the document
  const clean=JSON.parse(JSON.stringify(data));
  await window._setDoc(docRef, clean, {merge:true});
}

// ── Discogs ───────────────────────────────────────────────────────────────────
async function discogsLookup(barcode,token){
  const h={"User-Agent":"TheCollection/1.0"};
  if(token) h["Authorization"]=`Discogs token=${token}`;
  const r=await fetch(`https://api.discogs.com/database/search?barcode=${encodeURIComponent(barcode)}&per_page=6`,{headers:h});
  if(!r.ok) throw new Error(`Discogs ${r.status}`);
  return(await r.json()).results||[];
}
function mapDiscogs(result,tabKey){
  const raw=result.title||"",dash=raw.indexOf(" - ");
  const artist=dash>-1?raw.slice(0,dash).trim():"",album=dash>-1?raw.slice(dash+3).trim():raw;
  const genres=[...(result.genre||[]),...(result.style||[])];
  const label=(result.label||[])[0]||"",year=result.year?String(result.year):"";
  const catNo=(result.catno||"").trim();
  const fmts=result.format||[],base={id:crypto.randomUUID()};
  if(tabKey==="vinyl"){
    let format="LP";
    if(fmts.some(f=>f.includes("45")))format="45";
    else if(fmts.some(f=>f.includes("78")))format="78";
    else if(fmts.includes("EP"))format="EP";
    else if(fmts.some(f=>f.includes("Single")))format='7"';
    return{...base,artist,album,year,label,catNo,genres,format,condition:"",notes:""};
  }
  if(["cd","sacd","dvda","cassette"].includes(tabKey))
    return{...base,artists:artist?[artist]:[],album,year,label,catNo,genres,condition:"",notes:""};
  if(["dvd","vhs"].includes(tabKey))
    return{...base,title:album||raw,year,directors:[],cast:[],genres,format:tabKey==="dvd"?"DVD":"VHS",rating:"NR",condition:"",notes:""};
  return{...base,album,year,label,catNo,genres,condition:"",notes:""};
}

// ── TMDb ──────────────────────────────────────────────────────────────────────
const TMDB_GENRES={
  28:"Action",12:"Adventure",16:"Animation",35:"Comedy",80:"Crime",
  99:"Documentary",18:"Drama",10751:"Family",14:"Fantasy",36:"History",
  27:"Horror",10402:"Music",9648:"Mystery",10749:"Romance",878:"Science Fiction",
  10770:"TV Movie",53:"Thriller",10752:"War",37:"Western"
};

async function upcToTitle(barcode){
  // UPCitemdb free tier — gets product name from UPC, which we use to search TMDb
  const r=await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${encodeURIComponent(barcode)}`);
  if(!r.ok) return null;
  const data=await r.json();
  const title=(data.items||[])[0]?.title;
  if(!title) return null;
  // Strip format descriptors like "[Blu-ray]", "(DVD)", "(Widescreen)", etc.
  return title.replace(/\s*[\[\(](blu-?ray|dvd|4k\s*uhd|uhd|hd dvd|vhs|widescreen|fullscreen|special\s*edition|collector|extended|theatrical|unrated|director)[^\]\)]*[\]\)]/gi,"").trim();
}

async function tmdbSearch(query,tmdbToken){
  const r=await fetch(
    `https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(query)}&include_adult=false&per_page=6`,
    {headers:{"Authorization":`Bearer ${tmdbToken}`,"Content-Type":"application/json"}}
  );
  if(!r.ok) throw new Error(`TMDb ${r.status}`);
  return((await r.json()).results||[]).slice(0,6);
}

async function tmdbCredits(movieId,tmdbToken){
  const r=await fetch(
    `https://api.themoviedb.org/3/movie/${movieId}/credits`,
    {headers:{"Authorization":`Bearer ${tmdbToken}`}}
  );
  if(!r.ok) return{directors:[],cast:[]};
  const data=await r.json();
  const directors=(data.crew||[]).filter(p=>p.job==="Director").map(p=>p.name);
  const cast=(data.cast||[]).slice(0,8).map(p=>p.name);
  return{directors,cast};
}

async function tmdbRating(movieId,tmdbToken){
  const r=await fetch(
    `https://api.themoviedb.org/3/movie/${movieId}/release_dates`,
    {headers:{"Authorization":`Bearer ${tmdbToken}`}}
  );
  if(!r.ok) return"NR";
  const data=await r.json();
  const us=(data.results||[]).find(x=>x.iso_3166_1==="US");
  const cert=(us?.release_dates||[]).find(x=>x.certification)?.certification||"NR";
  return cert||"NR";
}

function mapTMDb(result,credits={},rating="NR"){
  return{
    id:crypto.randomUUID(),status:"have",stars:0,
    title:result.title||"",
    year:(result.release_date||"").slice(0,4),
    directors:credits.directors||[],
    cast:credits.cast||[],
    genres:(result.genre_ids||[]).map(id=>TMDB_GENRES[id]).filter(Boolean),
    format:"Blu-Ray",is3D:false,
    rating,condition:"",notes:""
  };
}

// ── TagInput ──────────────────────────────────────────────────────────────────
function TagInput({value=[],onChange,placeholder,suggestions=[]}){
  const [inp,setInp]=useState(""); const [open,setOpen]=useState(false);
  const ref=useRef(); const wrapRef=useRef();
  const matches=useMemo(()=>{
    if(!inp.trim())return[];
    const q=inp.toLowerCase();
    return suggestions.filter(s=>s.toLowerCase().includes(q)&&!value.includes(s)).slice(0,8);
  },[inp,suggestions,value]);
  const commit=raw=>{const t=raw.trim();if(t&&!value.includes(t))onChange([...value,t]);setInp("");setOpen(false);};
  const remove=t=>onChange(value.filter(x=>x!==t));
  const pick=s=>{onChange([...value,s]);setInp("");setOpen(false);ref.current?.focus();};
  useEffect(()=>{
    const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  return(
    <div className="tag-input-wrap" ref={wrapRef}>
      <div className="tag-input" onClick={()=>ref.current?.focus()}>
        {value.map(t=>(
          <span key={t} className="tag editable-tag">{t}
            <button className="tag-x" onClick={e=>{e.stopPropagation();remove(t);}}>×</button>
          </span>
        ))}
        <input ref={ref} className="tag-text-input" value={inp}
          onChange={e=>{setInp(e.target.value);setOpen(true);}}
          onKeyDown={e=>{
            if(e.key==="Enter"||e.key===","){e.preventDefault();commit(inp);}
            else if(e.key==="Escape")setOpen(false);
            else if(e.key==="Backspace"&&!inp&&value.length)remove(value[value.length-1]);
          }}
          onFocus={()=>inp&&setOpen(true)}
          onBlur={()=>{if(inp.trim())commit(inp);setTimeout(()=>setOpen(false),150);}}
          placeholder={value.length===0?placeholder:""}/>
      </div>
      {open&&matches.length>0&&(
        <div className="ac-dropdown">
          {matches.map(s=><button key={s} className="ac-item" onMouseDown={e=>{e.preventDefault();pick(s);}}>{s}</button>)}
          {inp.trim()&&!suggestions.includes(inp.trim())&&(
            <button className="ac-item ac-new" onMouseDown={e=>{e.preventDefault();commit(inp);}}>
              + Add "<strong>{inp.trim()}</strong>" as new
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ── TextAC ────────────────────────────────────────────────────────────────────
function TextAC({value,onChange,suggestions=[],placeholder}){
  const [open,setOpen]=useState(false); const wrapRef=useRef();
  const matches=useMemo(()=>{
    if(!value?.trim())return[];
    const q=value.toLowerCase();
    return suggestions.filter(s=>s.toLowerCase().includes(q)&&s!==value).slice(0,8);
  },[value,suggestions]);
  useEffect(()=>{
    const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  return(
    <div className="tag-input-wrap" ref={wrapRef}>
      <input className="f-input" value={value||""} placeholder={placeholder||""}
        onChange={e=>{onChange(e.target.value);setOpen(true);}}
        onFocus={()=>value?.trim()&&setOpen(true)}
        onBlur={()=>setTimeout(()=>setOpen(false),150)}/>
      {open&&matches.length>0&&(
        <div className="ac-dropdown">
          {matches.map(s=><button key={s} className="ac-item" onMouseDown={e=>{e.preventDefault();onChange(s);setOpen(false);}}>{s}</button>)}
        </div>
      )}
    </div>
  );
}

// ── Field Components ──────────────────────────────────────────────────────────
function FieldEditor({field,value,onChange,allSuggestions={}}){
  if(field.type==="text")     return <TextAC value={value||""} onChange={onChange} suggestions={allSuggestions[field.key]||[]} placeholder={field.label}/>;
  if(field.type==="textarea") return <textarea className="f-area" value={value||""} onChange={e=>onChange(e.target.value)}/>;
  if(field.type==="tags")     return <TagInput value={value||[]} onChange={onChange} placeholder={`Add ${field.label.toLowerCase()}…`} suggestions={allSuggestions[field.key]||[]}/>;
  if(field.type==="radio")    return(
    <div className="radio-group">
      {field.options.map(opt=>(
        <button key={opt} className={`radio-btn${(value||field.options[0])===opt?" radio-on":""}`} onClick={()=>onChange(opt)}>
          <span>{(value||field.options[0])===opt?"◉":"◎"}</span> {opt}
        </button>
      ))}
    </div>
  );
  if(field.type==="stars") return(
    <div className="star-input">
      {[1,2,3,4,5].map(n=>(
        <button key={n} className={`star-btn${(value||0)>=n?" star-on":""}`}
          onClick={()=>onChange((value||0)===n?0:n)}>★</button>
      ))}
      {(value||0)>0&&<span className="star-hint">tap again to clear</span>}
    </div>
  );
  if(field.type==="checkbox") return(
    <label className="checkbox-label">
      <input type="checkbox" checked={!!value} onChange={e=>onChange(e.target.checked)} className="checkbox-input"/>
      <span className="checkbox-custom">{value?"☑":"☐"}</span>
      <span className="checkbox-text">{value?"Yes":"No"}</span>
    </label>
  );
  if(field.type==="select") return(
    <select className="f-select" value={value||""} onChange={e=>onChange(e.target.value)}>
      <option value="">—</option>
      {field.options.map(o=><option key={o}>{o}</option>)}
    </select>
  );
  return null;
}
function FieldDisplay({field,value,onTagClick,af}){
  if(field.type==="tags") return(
    <div className="tag-display">
      {!(value||[]).length?<span className="dim">—</span>
        :(value||[]).map(t=><span key={t} className={`tag${af?.value===t?" tag-on":""}`} onClick={()=>onTagClick(field.key,t)}>{t}</span>)}
    </div>
  );
  if(field.type==="stars") return(
    <div className="star-display">
      {(value||0)===0
        ?<span className="dim">Unrated</span>
        :[1,2,3,4,5].map(n=><span key={n} className={`star-d${(value||0)>=n?" star-on":""}`}>★</span>)
      }
    </div>
  );
  if(field.type==="checkbox") return <span className={value?"checkbox-yes":"dim"}>{value?"☑ Yes":"☐ No"}</span>;
  if(field.type==="radio"){const v=value||field.options[0];return<span className={`rbadge${v==="Beta"?" rbeta":""}`}>{v}</span>;}
  return <span className={value?"":"dim"}>{value||"—"}</span>;
}

// ── Barcode Scanner ───────────────────────────────────────────────────────────
function BarcodeScanner({onDetect,onClose}){
  const videoRef=useRef(),streamRef=useRef(),aliveRef=useRef(true);
  const [status,setStatus]=useState("Starting camera…");
  const [manual,setManual]=useState("");
  const [noCamera,setNoCamera]=useState(false);
  useEffect(()=>{
    if(!("BarcodeDetector" in window)){setStatus("Enter barcode below.");setNoCamera(true);return;}
    (async()=>{
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
        if(!aliveRef.current){s.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=s;videoRef.current.srcObject=s;
        await videoRef.current.play();
        setStatus("Point camera at barcode…");
        const det=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128"]});
        const loop=async()=>{
          if(!aliveRef.current)return;
          try{const c=await det.detect(videoRef.current);if(c.length){stop();onDetect(c[0].rawValue);}else requestAnimationFrame(loop);}
          catch{requestAnimationFrame(loop);}
        };
        requestAnimationFrame(loop);
      }catch{setStatus("Camera denied — enter barcode below.");setNoCamera(true);}
    })();
    return stop;
  },[]);
  const stop=()=>{aliveRef.current=false;streamRef.current?.getTracks().forEach(t=>t.stop());};
  const submit=()=>{if(manual.trim()){stop();onDetect(manual.trim());}};
  return(
    <div className="overlay" onClick={()=>{stop();onClose();}}>
      <div className="scanner-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><span>Scan Barcode</span><button className="btn-icon" onClick={()=>{stop();onClose();}}>✕</button></div>
        {!noCamera&&<div className="vid-wrap"><video ref={videoRef} className="vid" playsInline muted/><div className="scan-line"/></div>}
        <p className="scan-status">{status}</p>
        <div className="scan-manual">
          <input className="f-input" placeholder="Or type barcode…" value={manual} onChange={e=>setManual(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          <button className="btn-save sm" onClick={submit}>Go</button>
        </div>
      </div>
    </div>
  );
}

// ── Smart field carry-over when switching media type ──────────────────────────
function mapDraftToSchema(draft, toKey) {
  const toSchema = SCHEMAS[toKey];
  const newDraft = toSchema.blankRecord();

  // Direct carries — same field key, compatible type
  ["album","year","label","catNo","genres","condition","notes"].forEach(k=>{
    if(draft[k]!==undefined && newDraft[k]!==undefined) newDraft[k]=draft[k];
  });

  // artist (text) ↔ artists (tags)
  if(draft.artist  && newDraft.artists!==undefined) newDraft.artists = draft.artist?[draft.artist]:[];
  if(draft.artists && newDraft.artist !==undefined) newDraft.artist  = (draft.artists||[])[0]||"";

  // album (music) ↔ title (video)
  if(draft.album && newDraft.title!==undefined) newDraft.title = draft.album;
  if(draft.title && newDraft.album!==undefined) newDraft.album = draft.title;

  // directors/cast don't map to music — intentionally dropped
  return newDraft;
}

// ── Add Panel ─────────────────────────────────────────────────────────────────
function AddPanel({tabKey,onAdd,onClose,discogsToken,tmdbToken,allSuggestions,catalog}){
  const [targetTab, setTargetTab] = useState(tabKey);
  const targetSchema = SCHEMAS[targetTab];
  const [draft,   setDraft]   = useState(targetSchema.blankRecord());
  const [fullMode,setFullMode] = useState(false);
  const [scanning,setScanning] = useState(false);
  const [lookup,  setLookup]  = useState(null);
  const [msg,     setMsg]     = useState("");
  const [results, setResults] = useState([]);
  const set=(k,v)=>setDraft(d=>({...d,[k]:v}));

  const switchType=newKey=>{
    setDraft(mapDraftToSchema(draft, newKey));
    setTargetTab(newKey);
    setFullMode(false);
  };

  const targetRecords = catalog[targetTab]||[];
  const duplicate=useMemo(()=>{
    const dl=targetSchema.summaryLine(draft).trim().toLowerCase();
    if(!dl) return null;
    return targetRecords.find(r=>targetSchema.summaryLine(r).trim().toLowerCase()===dl)||null;
  },[draft,targetRecords,targetSchema]);

  const isVideo = ["dvd","vhs"].includes(targetTab);

  const handleBarcode=async bc=>{
    setScanning(false);setLookup("loading");setMsg(`Looking up ${bc}…`);
    try{
      if(isVideo && tmdbToken){
        // Video tab — UPC → title → TMDb
        setMsg(`Finding title for ${bc}…`);
        const title=await upcToTitle(bc);
        if(!title){
          setLookup("error");
          setMsg("Barcode not found in product database — search by title or enter manually.");
          return;
        }
        setMsg(`Searching TMDb for "${title}"…`);
        const res=await tmdbSearch(title,tmdbToken);
        if(!res.length){setLookup("error");setMsg(`No TMDb match for "${title}" — fill in manually.`);return;}
        if(res.length===1){await applyTMDb(res[0]);}
        else{setResults(res);setLookup("pick-tmdb");}
      } else {
        // Music tab — Discogs
        const res=await discogsLookup(bc,discogsToken);
        if(!res.length){setLookup("error");setMsg("No Discogs match — fill in manually.");}
        else if(res.length===1){applyResult(mapDiscogs(res[0],targetTab));}
        else{setResults(res);setLookup("pick");}
      }
    }catch(e){setLookup("error");setMsg(`Lookup failed: ${e.message}`);}
  };

  const applyTMDb=async result=>{
    setLookup("loading");setMsg("Fetching cast and crew…");
    try{
      const [credits,rating]=await Promise.all([
        tmdbCredits(result.id,tmdbToken),
        tmdbRating(result.id,tmdbToken),
      ]);
      applyResult(mapTMDb(result,credits,rating));
    }catch{applyResult(mapTMDb(result));}
  };

  const applyResult=mapped=>{setDraft(d=>({...d,...mapped,id:d.id}));setResults([]);setLookup(null);setMsg("");setFullMode(true);};
  const visibleFields=fullMode?targetSchema.fields:targetSchema.fields.filter(f=>targetSchema.quickFields.includes(f.key));

  return(
    <>
      <div className="add-panel">
        <div className="add-header">
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            <span className="add-mode-label">{fullMode?"Full Entry":"Quick Add"}</span>
            <select className="type-selector" value={targetTab} onChange={e=>switchType(e.target.value)}>
              {DEFAULT_ORDER.map(key=>(
                <option key={key} value={key}>{SCHEMAS[key].label}</option>
              ))}
            </select>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button className="btn-scan" onClick={()=>setScanning(true)}>⬛ Scan</button>
            <button className="btn-icon" onClick={onClose}>✕</button>
          </div>
        </div>
        {lookup==="loading"&&<div className="lookup-bar loading">{msg}</div>}
        {lookup==="error"  &&<div className="lookup-bar error">{msg}<button className="lookup-dismiss" onClick={()=>setLookup(null)}>✕</button></div>}
        {duplicate&&<div className="lookup-bar duplicate">⚠ Already in your catalog — {targetSchema.summaryLine(duplicate)}</div>}
        <div className="card-detail">
          {visibleFields.map(field=>(
            <div key={field.key} className="field-row">
              <label className="field-label">{field.label}</label>
              <div className="field-val"><FieldEditor field={field} value={draft[field.key]} onChange={v=>set(field.key,v)} allSuggestions={allSuggestions}/></div>
            </div>
          ))}
          {!fullMode&&<button className="btn-expand" onClick={()=>setFullMode(true)}>▾ Full Details</button>}
          <div className="status-checks">
            <label className="status-check-row want-check">
              <input type="checkbox"
                checked={(draft.status||"have")==="want"}
                onChange={()=>set("status",(draft.status||"have")==="want"?"have":"want")}/>
              <span className="status-check-box want-box">{(draft.status||"have")==="want"?"☑":"☐"}</span>
              <span className="status-check-label">Want</span>
            </label>
            <label className="status-check-row need-check">
              <input type="checkbox"
                checked={(draft.status||"have")==="need"}
                onChange={()=>set("status",(draft.status||"have")==="need"?"have":"need")}/>
              <span className="status-check-box need-box">{(draft.status||"have")==="need"?"☑":"☐"}</span>
              <span className="status-check-label">Need</span>
            </label>
          </div>
          <div className="edit-actions">
            <button className="btn-save" onClick={()=>{onAdd({...draft,id:crypto.randomUUID()},targetTab);onClose();}}>Add to Catalog</button>
            <button className="btn-cancel" onClick={onClose}>Cancel</button>
          </div>
        </div>
      </div>
      {scanning&&<BarcodeScanner onDetect={handleBarcode} onClose={()=>setScanning(false)}/>}
      {lookup==="pick"&&<DiscogsPicker results={results} tabKey={targetTab} onSelect={applyResult} onClose={()=>setLookup(null)}/>}
      {lookup==="pick-tmdb"&&<TmdbPicker results={results} onSelect={r=>{setLookup(null);applyTMDb(r);}} onClose={()=>setLookup(null)}/>}
    </>
  );
}

// ── Record Card ───────────────────────────────────────────────────────────────
function RecordCard({record,schema,onUpdate,onDelete,onTagClick,af,allSuggestions,expandedId,setExpandedId}){
  const expanded = expandedId === record.id;
  const [editing, setEditing] =useState(false);
  const [draft,   setDraft]   =useState(record);
  const [confirm, setConfirm] =useState(false);

  // Reset editing state when accordion closes this card
  useEffect(()=>{
    if(!expanded){ setEditing(false); setConfirm(false); }
  },[expanded]);

  // Keep draft fresh if record updates externally
  useEffect(()=>{
    if(!editing) setDraft(record);
  },[record]);
  const startEdit=()=>{setDraft({...record});setEditing(true);setExpandedId(record.id);};
  const cancel=()=>{setDraft(record);setEditing(false);setConfirm(false);};
  const save=()=>{onUpdate(draft);setEditing(false);};
  const set=(k,v)=>setDraft(d=>({...d,[k]:v}));
  const toggle=()=>setExpandedId(expanded?null:record.id);
  const title  =schema.summaryLine(record);
  const metas  =schema.metaFields.map(k=>record[k]).filter(Boolean);
  const allTags=schema.tagFields.flatMap(f=>(record[f]||[]).map(tag=>({f,tag})));
  const incomplete=!record.condition;

  return(
    <div className={`card${expanded?" expanded":""}${editing?" editing":""}${incomplete?" incomplete":""}${status==="want"?" status-want":""}${status==="need"?" status-need":""}`}>

            <div className="status-checks">
              <label className="status-check-row want-check">
                <input type="checkbox"
                  checked={(record.status||"have")==="want"}
                  onChange={()=>onUpdate({...record,status:(record.status||"have")==="want"?"have":"want"})}/>
                <span className="status-check-box want-box">{(record.status||"have")==="want"?"☑":"☐"}</span>
                <span className="status-check-label">Want</span>
              </label>
              <label className="status-check-row need-check">
                <input type="checkbox"
                  checked={(record.status||"have")==="need"}
                  onChange={()=>onUpdate({...record,status:(record.status||"have")==="need"?"have":"need"})}/>
                <span className="status-check-box need-box">{(record.status||"have")==="need"?"☑":"☐"}</span>
                <span className="status-check-label">Need</span>
              </label>
            </div>
          )}
          {editing&&(
            <div className="status-checks">
              <label className="status-check-row want-check">
                <input type="checkbox"
                  checked={(draft.status||"have")==="want"}
                  onChange={()=>set("status",(draft.status||"have")==="want"?"have":"want")}/>
                <span className="status-check-box want-box">{(draft.status||"have")==="want"?"☑":"☐"}</span>
                <span className="status-check-label">Want</span>
              </label>
              <label className="status-check-row need-check">
                <input type="checkbox"
                  checked={(draft.status||"have")==="need"}
                  onChange={()=>set("status",(draft.status||"have")==="need"?"have":"need")}/>

// ── Settings Panel ────────────────────────────────────────────────────────────
function SettingsPanel({order,hidden,token,tmdbToken,catalog,onSave,onImport,onClose}){
  const [lo,setLo]=useState([...order]);
  const [lh,setLh]=useState([...hidden]);
  const [lt,setLt]=useState(token);
  const [ltmdb,setLtmdb]=useState(tmdbToken||"");
  const [importErr,setImportErr]=useState("");
  const fileRef=useRef();
  const move=(i,dir)=>{const j=i+dir;if(j<0||j>=lo.length)return;const n=[...lo];[n[i],n[j]]=[n[j],n[i]];setLo(n);};
  const toggleHide=key=>setLh(h=>h.includes(key)?h.filter(x=>x!==key):[...h,key]);

  // ── Export JSON ──
  const exportJSON=()=>{
    const data=JSON.stringify({catalog,order,hidden,token,exportedAt:new Date().toISOString()},null,2);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([data],{type:"application/json"}));
    a.download=`TheCollection-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  // ── Export CSV (current tab summary) ──
  const exportCSV=()=>{
    const rows=[];
    DEFAULT_ORDER.forEach(tab=>{
      const schema=SCHEMAS[tab];
      const records=catalog[tab]||[];
      if(!records.length) return;
      records.forEach(r=>{
        const row={Tab:schema.label};
        schema.fields.forEach(f=>{
          const v=r[f.key];
          row[f.label]=Array.isArray(v)?v.join("; "):(v||"");
        });
        // Ensure primary title field is always populated
        if(!row["Album"]&&!row["Title"]){
          row["Title"]=r.title||r.album||"";
        }
        rows.push(row);
      });
    });
    if(!rows.length) return;
    // Build unified header set preserving order
    const headerSet=new Set();
    headerSet.add("Tab");
    rows.forEach(r=>Object.keys(r).forEach(k=>headerSet.add(k)));
    const headers=[...headerSet];
    const csv=[
      headers.join(","),
      ...rows.map(r=>headers.map(h=>`"${(r[h]||"").toString().replace(/"/g,'""')}"`).join(","))
    ].join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download=`TheCollection-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  // ── Export XLSX (one tab per media type, frozen + colored header, autofit columns) ──
  const [xlsxErr,setXlsxErr]=useState("");
  const exportXLSX=()=>{
    setXlsxErr("");
    if(typeof XLSX==="undefined"){
      setXlsxErr("Excel library failed to load — check internet connection, or use CSV/JSON export instead.");
      return;
    }
    try{
      const wb=XLSX.utils.book_new();
      let sheetsAdded=0;
      DEFAULT_ORDER.forEach(tab=>{
        const schema=SCHEMAS[tab];
        const records=catalog[tab]||[];
        if(!records.length) return;
        const rows=records.map(r=>{
          const row={};
          schema.fields.forEach(f=>{
            const v=r[f.key];
            row[f.label]=Array.isArray(v)?v.join("; "):(v||"");
          });
          row["Status"]=r.status==="want"?"Want":r.status==="need"?"Need":"Have";
          row["My Rating"]=r.stars?`${r.stars}/5`:"";
          return row;
        });
        const ws=XLSX.utils.json_to_sheet(rows);
        const headers=Object.keys(rows[0]);

        // Autofit column widths to the longest value (header or data) in each column
        ws["!cols"]=headers.map(h=>{
          let maxLen=h.length;
          rows.forEach(r=>{
            const len=(r[h]||"").toString().length;
            if(len>maxLen) maxLen=len;
          });
          return {wch:maxLen+2};
        });

        // Freeze the header row
        ws["!freeze"]="A2";

        // Color + bold the header row — amber fill, white bold text, matches app theme
        const headerStyle={
          fill:{fgColor:{rgb:"C4903A"}},
          font:{bold:true,color:{rgb:"FFFFFF"}},
          alignment:{vertical:"center"},
        };
        headers.forEach((h,colIdx)=>{
          const headRef=XLSX.utils.encode_cell({r:0,c:colIdx});
          if(ws[headRef]) ws[headRef].s=headerStyle;
        });

        // Explicitly mark the Year column as text-formatted so Excel stops
        // flagging it with the "Number stored as text" warning — Year is
        // intentionally text (handles blanks, ranges, etc.) and should
        // never auto-convert to a real number.
        const yearColIdx=headers.indexOf("Year");
        if(yearColIdx>-1){
          for(let r=1;r<=rows.length;r++){
            const ref=XLSX.utils.encode_cell({r,c:yearColIdx});
            if(ws[ref]) ws[ref].z="@";
          }
        }

        // Excel sheet names cannot contain : \ / ? * [ ] and must be ≤31 chars
        const safeName=schema.label.replace(/[:\\\/\?\*\[\]]/g,"-").slice(0,31);
        XLSX.utils.book_append_sheet(wb,ws,safeName);
        sheetsAdded++;
      });
      if(!sheetsAdded){
        setXlsxErr("No records to export yet.");
        return;
      }
      XLSX.writeFile(wb,`TheCollection-${new Date().toISOString().slice(0,10)}.xlsx`);
    }catch(e){
      setXlsxErr(`Excel export failed: ${e.message}`);
    }
  };

  // ── Import JSON ──
  const handleImport=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.catalog) throw new Error("Not a valid Collection backup file");
        onImport(data);
        onClose();
      }catch(err){
        setImportErr(`Import failed: ${err.message}`);
      }
    };
    reader.readAsText(file);
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="settings-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><span>Settings</span><button className="btn-icon" onClick={onClose}>✕</button></div>

        <div className="settings-section-label">Tab Order &amp; Visibility</div>
        <div className="order-list">
          {lo.map((key,i)=>{
            const isHidden=lh.includes(key);
            return(
              <div key={key} className={`order-item${isHidden?" order-hidden":""}`}>
                <span className="order-pos">{i+1}</span>
                <span className="order-label">{SCHEMAS[key].label}</span>
                <div className="order-controls">
                  <button className="vis-btn" onClick={()=>toggleHide(key)}>{isHidden?"○":"●"}</button>
                  <button className="arr-btn" onClick={()=>move(i,-1)} disabled={i===0}>↑</button>
                  <button className="arr-btn" onClick={()=>move(i,+1)} disabled={i===lo.length-1}>↓</button>
                </div>
              </div>
            );
          })}
        </div>
        <p className="settings-hint">● visible &nbsp;○ hidden — data always preserved</p>

        <div className="settings-section-label">Discogs API Token</div>
        <div className="token-row">
          <input className="f-input" type="password" placeholder="Paste your Discogs token…" value={lt} onChange={e=>setLt(e.target.value)}/>
        </div>
        <p className="settings-hint">Free at <strong>discogs.com/settings/developers</strong></p>

        <div className="settings-section-label">TMDb API Token</div>
        <div className="token-row">
          <input className="f-input" type="password" placeholder="Paste your TMDb Bearer token…" value={ltmdb} onChange={e=>setLtmdb(e.target.value)}/>
        </div>
        <p className="settings-hint">Free at <strong>themoviedb.org/settings/api</strong><br/>Required for DVD/VHS barcode lookups.</p>

        <div className="settings-section-label">Backup &amp; Restore</div>
        <div className="export-row">
          <button className="btn-export" onClick={exportJSON}>⬇ Export JSON</button>
          <button className="btn-export" onClick={exportXLSX}>⬇ Export Excel</button>
          <button className="btn-export" onClick={exportCSV}>⬇ Export CSV</button>
          <button className="btn-export" onClick={()=>fileRef.current.click()}>⬆ Import JSON</button>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/>
        </div>
        {importErr&&<p className="settings-hint" style={{color:"var(--danger)"}}>{importErr}</p>}
        {xlsxErr&&<p className="settings-hint" style={{color:"var(--danger)"}}>{xlsxErr}</p>}
        <p className="settings-hint">JSON export is a full backup — restores everything.<br/>Excel export gives each media type its own tab — cleanest for viewing.<br/>CSV export is one flat table — simplest, but mixes all types together.</p>

        <div className="order-footer">
          <button className="btn-save" onClick={()=>{onSave(lo,lh,lt,ltmdb);onClose();}}>Save Settings</button>
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [catalog,    setCatalog]    = useState(blankCatalog());
  const [order,      setOrder]      = useState(DEFAULT_ORDER);
  const [hidden,     setHidden]     = useState([]);
  const [token,      setToken]      = useState("");
  const [tmdbToken,  setTmdbToken]  = useState("");
  const [loaded,     setLoaded]     = useState(false);
  const [syncing,    setSyncing]    = useState(false);
  const [syncErr,    setSyncErr]    = useState("");
  const [activeTab,  setActiveTab]  = useState("vinyl");
  const [search,     setSearch]     = useState("");
  const [filter,     setFilter]     = useState(null);
  const [showAdd,    setShowAdd]    = useState(false);
  const [showBrowse, setShowBrowse] = useState(false);
  const [statusFilter,setStatusFilter]=useState("all");
  const [showSettings,setShowSettings]=useState(false);
  const [flash,      setFlash]      = useState(false);
  const [theme,      setTheme]      = useState(()=>localStorage.getItem("col:theme")||"dark");
  const firstRender  = useRef(true);

  const toggleTheme=()=>setTheme(t=>{
    const next=t==="dark"?"light":"dark";
    localStorage.setItem("col:theme",next);
    return next;
  });

  // Load from Firebase on mount
  useEffect(()=>{
    const init=async()=>{
      try{
        const data=await fbLoad();
        setCatalog(data.catalog);
        setOrder(data.order);
        setHidden(data.hidden);
        setToken(data.token);
        setTmdbToken(data.tmdbToken||"");
        setActiveTab(data.order.find(k=>!data.hidden.includes(k))||data.order[0]);
      }catch(e){
        setSyncErr("Cloud load failed — working offline");
      }finally{
        setLoaded(true);
        document.getElementById("splash").style.display="none";
      }
    };
    if(window._fbReady) init();
    else window.addEventListener("fbready",init,{once:true});
  },[]);

  // Auto-save to Firebase whenever data changes (debounced)
  useEffect(()=>{
    if(!loaded) return;
    if(firstRender.current){ firstRender.current=false; return; }
    const timer=setTimeout(async()=>{
      setSyncing(true);
      try{
        await fbSave({catalog,order,hidden,token,tmdbToken});
        setFlash(true);setTimeout(()=>setFlash(false),1200);
        setSyncErr("");
      }catch(e){
        setSyncErr("Sync failed — check connection");
      }finally{setSyncing(false);}
    },1500);
    return()=>clearTimeout(timer);
  },[catalog,order,hidden,token,tmdbToken,loaded]);

  const schema      = SCHEMAS[activeTab]||SCHEMAS.vinyl;
  const records     = catalog[activeTab]||[];
  const visibleTabs = order.filter(k=>!hidden.includes(k));

  const tagIndex=useMemo(()=>{
    const idx={};
    schema.tagFields.forEach(f=>{
      const counts={};
      records.forEach(r=>(r[f]||[]).forEach(v=>{counts[v]=(counts[v]||0)+1;}));
      idx[f]=Object.entries(counts).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));
    });
    return idx;
  },[records,schema]);

  const allSuggestions=useMemo(()=>{
    const s={};
    Object.entries(tagIndex).forEach(([k,e])=>{s[k]=e.map(([tag])=>tag);});
    schema.fields.filter(f=>f.type==="text").forEach(f=>{
      const counts={};
      records.forEach(r=>{const v=r[f.key]?.trim();if(v)counts[v]=(counts[v]||0)+1;});
      s[f.key]=Object.entries(counts).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0])).map(([v])=>v);
    });
    return s;
  },[tagIndex,records,schema]);

  const filtered=records.filter(r=>{
    if(statusFilter!=="all"&&(r.status||"have")!==statusFilter) return false;
    if(filter){const v=r[filter.field];if(Array.isArray(v)?!v.includes(filter.value):v!==filter.value)return false;}
    if(search.trim()&&!JSON.stringify(r).toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  // Strip leading articles for sort purposes
  const stripArticle = s => s.replace(/^(the|a|an)\s+/i,"").trim();

  // Silent automatic sort
  const sortKey = r => {
    const isVideo = ["dvd","vhs"].includes(activeTab);
    if(isVideo){
      const title = stripArticle(r.title||"").toLowerCase();
      const year  = parseInt(r.year)||9999;
      return `${title}||${String(year).padStart(4,"0")}`;
    }
    const primary =
      (r.artists&&r.artists[0]) ? stripArticle(r.artists[0]).toLowerCase() :
      (r.artist)                ? stripArticle(r.artist).toLowerCase()      : "";
    const secondary = stripArticle(r.album||r.title||"").toLowerCase();
    const year = parseInt(r.year)||9999;
    return `${primary}||${secondary}||${String(year).padStart(4,"0")}`;
  };

  const sorted = [...filtered].sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));

  const [expandedId, setExpandedId] = useState(null);

  const tagClick=(field,value)=>{setFilter(f=>(f?.field===field&&f?.value===value)?null:{field,value});setShowBrowse(false);};
  const switchTab=tab=>{setActiveTab(tab);setFilter(null);setSearch("");setShowAdd(false);setShowBrowse(false);setExpandedId(null);setStatusFilter("all");};
  const saveSettings=(no,nh,nt,ntmdb)=>{
    setOrder(no);setHidden(nh);setToken(nt);setTmdbToken(ntmdb||"");
    if(!no.filter(k=>!nh.includes(k)).includes(activeTab))
      switchTab(no.find(k=>!nh.includes(k))||no[0]);
  };
  const handleImport=data=>{
    if(data.catalog) setCatalog({...blankCatalog(),...data.catalog});
    if(data.order)   setOrder(data.order);
    if(data.hidden)  setHidden(data.hidden);
    if(data.token)   setToken(data.token);
  };
  const update=rec=>setCatalog(prev=>({...prev,[activeTab]:prev[activeTab].map(r=>r.id===rec.id?rec:r)}));
  const remove=id =>setCatalog(prev=>({...prev,[activeTab]:prev[activeTab].filter(r=>r.id!==id)}));
  const add   =useCallback((rec,targetTab)=>{
    const dest=targetTab||activeTab;
    setCatalog(prev=>({...prev,[dest]:[rec,...prev[dest]]}));
  },[activeTab]);
  const counts=Object.fromEntries(Object.entries(catalog).map(([k,v])=>[k,v.length]));

        .tag-display{display:flex;flex-wrap:wrap;gap:4px;padding-top:2px;}
        .radio-group{display:flex;gap:8px;flex-wrap:wrap;}
        .radio-btn{background:var(--surf2);border:1px solid var(--b2);border-radius:var(--r);color:var(--tx2);font-family:var(--M);font-size:12px;padding:6px 16px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .12s;}
        .radio-btn:hover{border-color:var(--tx2);color:var(--tx);}
        .radio-btn.radio-on{background:var(--adim);border-color:var(--a);color:var(--a);}
        .checkbox-label{display:flex;align-items:center;gap:8px;cursor:pointer;padding-top:2px;}
        .checkbox-input{position:absolute;opacity:0;width:0;height:0;}
        .checkbox-custom{font-size:16px;color:var(--a);line-height:1;}
        .checkbox-text{font-size:12px;color:var(--tx2);}
        .checkbox-yes{color:var(--a);}
        .rbadge{display:inline-block;background:var(--surf3);border:1px solid var(--b2);border-radius:2px;color:var(--a);font-size:11px;padding:2px 10px;}
        .rbeta{color:var(--beta);border-color:var(--beta);background:var(--betabg);}
        .card-detail{border-top:1px solid var(--b1);padding:0 14px 14px;}
        .field-row{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:start;padding:9px 0;border-bottom:1px solid var(--b1);}
        .field-row:last-of-type{border-bottom:none;}
        .field-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);padding-top:9px;}
        .field-val{font-size:13px;color:var(--tx);padding-top:5px;}
        .dim{color:var(--tx3);}
        .f-input,.f-area,.f-select{width:100%;background:var(--surf2);border:1px solid var(--b2);border-radius:var(--r);color:var(--tx);font-family:var(--M);font-size:13px;padding:6px 10px;outline:none;transition:border-color .12s;}
        .f-input:focus,.f-area:focus,.f-select:focus{border-color:var(--a);}
        .f-area{min-height:72px;resize:vertical;}
        .f-select option{background:var(--surf2);}
        .btn-icon{background:none;border:1px solid transparent;border-radius:var(--r);color:var(--tx3);cursor:pointer;font-size:15px;padding:3px 7px;transition:all .1s;}
        .btn-icon:hover{color:var(--tx);border-color:var(--b2);}
        .btn-danger-sm{background:var(--dbg);border:1px solid var(--danger);border-radius:var(--r);color:var(--danger);font-family:var(--M);font-size:11px;padding:3px 8px;cursor:pointer;}
        .btn-ghost-sm{background:none;border:1px solid var(--b2);border-radius:var(--r);color:var(--tx2);font-family:var(--M);font-size:11px;padding:3px 8px;cursor:pointer;}
        .edit-actions{display:flex;gap:8px;padding-top:14px;}
        .btn-save{background:var(--a);border:none;border-radius:var(--r);color:var(--bg);font-family:var(--M);font-size:12px;font-weight:500;letter-spacing:.5px;padding:8px 22px;cursor:pointer;transition:background .15s;}
        .btn-save:hover{background:var(--a2);}
        .btn-save.sm{padding:6px 14px;}
        .btn-cancel{background:none;border:1px solid var(--b2);border-radius:var(--r);color:var(--tx2);font-family:var(--M);font-size:12px;padding:8px 16px;cursor:pointer;}
        .btn-cancel:hover{border-color:var(--tx2);color:var(--tx);}
        .delete-row{display:flex;align-items:center;gap:10px;padding-top:14px;border-top:1px solid var(--b1);margin-top:6px;}
        .delete-msg{font-size:11px;color:var(--danger);flex:1;}
        .btn-trash{background:none;border:1px solid var(--b1);border-radius:var(--r);color:var(--tx3);font-family:var(--M);font-size:11px;padding:6px 14px;cursor:pointer;transition:all .15s;}
        .btn-trash:hover{border-color:var(--danger);color:var(--danger);background:var(--dbg);}
        .add-panel{background:var(--surf);border:1px solid var(--a);border-radius:var(--r);margin-bottom:16px;overflow:hidden;}
        .add-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--b1);}
        .add-mode-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--a);}
        .type-selector{background:var(--surf2);border:1px solid var(--a);border-radius:var(--r);color:var(--a);font-family:var(--M);font-size:11px;padding:4px 8px;cursor:pointer;outline:none;}
        .type-selector option{background:var(--surf2);color:var(--tx);}
        .btn-scan{background:var(--surf2);border:1px solid var(--b2);border-radius:var(--r);color:var(--tx2);font-family:var(--M);font-size:11px;padding:5px 12px;cursor:pointer;transition:all .12s;}
        .btn-scan:hover{border-color:var(--a);color:var(--a);}
        .btn-expand{background:none;border:none;color:var(--a);font-family:var(--M);font-size:11px;cursor:pointer;padding:8px 0 4px;display:block;opacity:.8;}
        .btn-expand:hover{opacity:1;}
        .lookup-bar{padding:8px 14px;font-size:11px;display:flex;align-items:center;gap:8px;}
        .lookup-bar.loading{background:var(--abg);color:var(--a);}
        .lookup-bar.error{background:var(--dbg);color:var(--danger);}
        .lookup-bar.duplicate{background:rgba(196,144,58,.12);color:var(--a);border-top:1px solid var(--b1);}
        .lookup-dismiss{background:none;border:none;color:inherit;cursor:pointer;font-size:14px;margin-left:auto;}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;}
        .scanner-modal,.picker-modal,.settings-modal{background:var(--surf);border:1px solid var(--b2);border-radius:6px;width:360px;max-width:94vw;overflow:hidden;}
        .settings-modal{width:400px;max-height:90vh;overflow-y:auto;}
        .modal-header{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--a);border-bottom:1px solid var(--b1);}
        .vid-wrap{position:relative;background:#000;aspect-ratio:4/3;overflow:hidden;}
        .vid{width:100%;height:100%;object-fit:cover;}
        .scan-line{position:absolute;left:10%;right:10%;top:50%;height:2px;background:var(--a);opacity:.8;box-shadow:0 0 8px var(--a);}
        .scan-status{padding:10px 16px;font-size:11px;color:var(--tx2);text-align:center;}
        .scan-manual{display:flex;gap:8px;padding:0 16px 16px;}
        .picker-list{display:flex;flex-direction:column;max-height:50vh;overflow-y:auto;}
        .picker-item{background:none;border:none;border-bottom:1px solid var(--b1);color:var(--tx);cursor:pointer;display:flex;flex-direction:column;gap:3px;padding:12px 16px;text-align:left;transition:background .1s;}
        .picker-item:hover{background:var(--surf2);}
        .picker-item:last-child{border-bottom:none;}
        .picker-title{font-size:13px;}
        .picker-sub{font-size:10px;color:var(--tx2);}
        .export-row{display:flex;gap:8px;padding:4px 16px 8px;flex-wrap:wrap;}
        .btn-export{background:var(--surf2);border:1px solid var(--b2);border-radius:var(--r);color:var(--tx2);font-family:var(--M);font-size:11px;padding:7px 14px;cursor:pointer;transition:all .12s;white-space:nowrap;}
        .btn-export:hover{border-color:var(--a);color:var(--a);}
        .settings-section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);padding:12px 16px 6px;}
        .order-list{padding:4px 0;}
        .order-item{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--b1);transition:opacity .15s;}
        .order-item:last-child{border-bottom:none;}
        .order-item.order-hidden{opacity:.4;}
        .order-pos{font-size:10px;color:var(--tx3);width:14px;text-align:right;}
        .order-label{font-size:13px;color:var(--tx);flex:1;}
        .order-controls{display:flex;gap:4px;align-items:center;}
        .vis-btn{background:none;border:1px solid var(--b2);border-radius:var(--r);color:var(--a);cursor:pointer;font-size:12px;padding:3px 8px;transition:all .1s;}
        .vis-btn:hover{background:var(--abg);}
        .arr-btn{background:var(--surf2);border:1px solid var(--b2);border-radius:var(--r);color:var(--tx2);cursor:pointer;font-size:13px;padding:3px 8px;transition:all .1s;}
        .arr-btn:hover:not(:disabled){background:var(--adim);border-color:var(--a);color:var(--a);}
        .arr-btn:disabled{opacity:.2;cursor:default;}
        .settings-hint{font-size:10px;color:var(--tx3);padding:6px 16px 10px;line-height:1.6;}
        .token-row{padding:0 16px 4px;}
        .order-footer{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--b1);}
        .empty{text-align:center;padding:64px 20px;color:var(--tx3);}
        .empty-title{font-family:var(--D);font-size:22px;color:var(--tx2);margin-bottom:8px;}
        .empty-sub{font-size:11px;}
        .loading{display:flex;align-items:center;justify-content:center;min-height:220px;color:var(--tx3);font-size:11px;letter-spacing:3px;}
      `}</style>

      <div className={`app${theme==="light"?" light":""}`}>
        <div className="hdr">
          <div className="hdr-top">
            <h1 className="title">The Collection</h1>
            <span className="sub">Personal Media Catalog</span>
          </div>
          <div className={`sync-bar ${syncErr?"err":"ok"}`}>
            {syncErr || (syncing?"↑ syncing…":flash?"✓ saved to cloud":"")}
          </div>
          <div className="tab-row">
            <div className="tabs">
              {visibleTabs.map(key=>(
                <button key={key} className={`tab${activeTab===key?" on":""}`} onClick={()=>switchTab(key)}>
                  {SCHEMAS[key].label}<span className="tab-n">{counts[key]||0}</span>
                </button>
              ))}
            </div>
            <button className="btn-gear" onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
            <button className="btn-gear" onClick={toggleTheme} title="Toggle theme">{theme==="dark"?"☀":"🌙"}</button>
          </div>
        </div>

        <div className="toolbar">
          <div className="sw">
            <span className="si">⌕</span>
            <input className="search-input" placeholder={`Search ${schema.label}…`}
              value={search} onChange={e=>{setSearch(e.target.value);setShowBrowse(false);}}/>
          </div>
          <button className={`btn-browse${showBrowse?" on":""}`} onClick={()=>{setShowBrowse(x=>!x);setShowAdd(false);}}>
            ≡ Browse
          </button>
          <button className={`btn-status-filter want-filter${statusFilter==="want"?" on":""}`}
            onClick={()=>setStatusFilter(f=>f==="want"?"all":"want")}>
            ★ Want
          </button>
          <button className={`btn-status-filter need-filter${statusFilter==="need"?" on":""}`}
            onClick={()=>setStatusFilter(f=>f==="need"?"all":"need")}>
            ! Need
          </button>
          <button className="btn-add" onClick={()=>{setShowAdd(x=>!x);setShowBrowse(false);}}>
            {showAdd?"✕ Cancel":"+ New Entry"}
          </button>
          <span className={`saved${flash?" on":""}`}>●</span>
        </div>

        {filter&&(
          <div className="filter-bar">
            <span>Filtering by</span>
            <span className="fpill">{filter.value}<button onClick={()=>setFilter(null)}>✕</button></span>
            <span className="fcount">— {sorted.length} result{sorted.length!==1?"s":""}</span>
          </div>
        )}

        {showBrowse&&<BrowsePanel schema={schema} tagIndex={tagIndex} activeFilter={filter} onTagClick={tagClick} onClose={()=>setShowBrowse(false)}/>}

        {showAdd&&(
          <AddPanel tabKey={activeTab}
            onAdd={(rec,dest)=>{add(rec,dest);setShowAdd(false);}}
            onClose={()=>setShowAdd(false)}
            discogsToken={token} tmdbToken={tmdbToken}
            allSuggestions={allSuggestions} catalog={catalog}/>
        )}

        {showSettings&&(
          <SettingsPanel order={order} hidden={hidden} token={token} tmdbToken={tmdbToken} catalog={catalog}
            onSave={(no,nh,nt,ntmdb)=>saveSettings(no,nh,nt,ntmdb)}
            onImport={handleImport}
            onClose={()=>setShowSettings(false)}/>
        )}

        {!loaded
          ?<div className="loading">CONNECTING…</div>
          :sorted.length===0
            ?<div className="empty">
               <div className="empty-title">{records.length===0?`No ${schema.label} entries yet`:"No matches"}</div>
               <div className="empty-sub">{records.length===0?"Hit + New Entry or scan a barcode to get started":"Clear the filter or try a different search"}</div>
             </div>
            :<div className="records">
               {sorted.map(record=>(
                 <RecordCard key={record.id} record={record} schema={schema}
                   onUpdate={update} onDelete={remove}
                   onTagClick={tagClick} af={filter} allSuggestions={allSuggestions}
                   expandedId={expandedId} setExpandedId={setExpandedId}/>
               ))}
             </div>
        }
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
